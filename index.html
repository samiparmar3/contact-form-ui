<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
        }

        /* CONTAINER + BACKGROUND */
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* GLOW BLOBS */
        .container::before,
        .container::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 6s ease-in-out infinite;
        }

        .container::before {
            width: 300px;
            height: 300px;
            background: #ff6ec4;
            top: -100px;
            left: -100px;
        }

        .container::after {
            width: 300px;
            height: 300px;
            background: #7873f5;
            bottom: -100px;
            right: -100px;
        }

        /* FLOAT ANIMATION */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(20px); }
            100% { transform: translateY(0px); }
        }

        /* GLASS FORM */
        .form {
            background: rgba(255, 255, 255, 0.1);
            padding: 35px 30px;
            border-radius: 15px;
            width: 320px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            z-index: 1;
        }

        /* HEADING */
        .form h1 {
            
            text-align: center;
            margin-bottom: 25px;
            color: white;
            font-size: 50px;
            font-weight: 900;
            background: linear-gradient(to right, red,blue);
            color: transparent;
            -webkit-background-clip: text;
        }

        /* INPUT BOX */
        .input-box {
            position: relative;
            margin-bottom: 22px;
        }

        /* INPUTS */
        .input-box input,
        .input-box textarea {
            width: 100%;
            padding: 10px 8px;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.5);
            outline: none;
            font-size: 14px;
            background: transparent;
            color: white;
            transition: 0.3s;
            resize: none;
        }

        .input-box textarea {
            height: 80px;
        }

        /* LABEL */
        .input-box label {
            position: absolute;
            top: 10px;
            left: 8px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            transition: 0.3s;
            pointer-events: none;
        }

        /* FLOAT EFFECT */
        .input-box input:focus ~ label,
        .input-box input:valid ~ label,
        .input-box textarea:focus ~ label,
        .input-box textarea:valid ~ label {
            top: -8px;
            font-size: 12px;
            color: white;
            background: rgba(0, 0, 0, 0.3);
            padding: 0 5px;
            border-radius: 4px;
        }

        /* FOCUS + HOVER */
        .input-box input:focus,
        .input-box textarea:focus,
        .input-box input:hover,
        .input-box textarea:hover {
            border-bottom: 2px solid white;
        }

        /* BUTTON */
        button {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(1.05);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .form {
                width: 90%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <form action="#" class="form">
            <h1>Contact Form</h1>

            <div class="input-box">
                <input type="text" required>
                <label>Name</label>
            </div>

            <div class="input-box">
                <input type="email" required>
                <label>Email</label>
            </div>

            <div class="input-box">
                <input type="tel" required>
                <label>Contact No.</label>
            </div>

            <div class="input-box">
                <input type="text" required>
                <label>Subject</label>
            </div>

            <div class="input-box">
                <textarea name="message" required></textarea>
                <label>Message</label>
            </div>

            <button type="submit">Send Message</button>
        </form>
    </div>
</body>

</html>
